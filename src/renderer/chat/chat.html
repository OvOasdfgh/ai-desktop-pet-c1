<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="chat.css">
</head>
<body data-theme="pixel">
  <div class="chat-container entering">
    <div class="chat-header">
      <div class="chat-header-drag"></div>
      <button class="chat-window-btn" id="minimizeBtn">
        <svg class="icon-pixel" width="10" height="10" viewBox="0 0 10 10"><rect x="1" y="5" width="8" height="1" fill="currentColor"/></svg>
        <svg class="icon-clean" width="10" height="10" viewBox="0 0 10 10"><line x1="2" y1="5" x2="8" y2="5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>
      </button>
      <button class="chat-window-btn" id="maximizeBtn">
        <svg class="icon-pixel maximize-normal" width="10" height="10" viewBox="0 0 10 10"><rect x="1" y="1" width="8" height="8" fill="none" stroke="currentColor" stroke-width="1"/></svg>
        <svg class="icon-pixel maximize-restored" width="10" height="10" viewBox="0 0 10 10" style="display:none"><rect x="0" y="2" width="7" height="7" fill="none" stroke="currentColor" stroke-width="1"/><polyline points="3,2 3,0 10,0 10,7 7,7" fill="none" stroke="currentColor" stroke-width="1"/></svg>
        <svg class="icon-clean maximize-normal" width="10" height="10" viewBox="0 0 10 10"><rect x="1.5" y="1.5" width="7" height="7" rx="1" fill="none" stroke="currentColor" stroke-width="1.2"/></svg>
        <svg class="icon-clean maximize-restored" width="10" height="10" viewBox="0 0 10 10" style="display:none"><rect x="0.5" y="2.5" width="6" height="6" rx="1" fill="none" stroke="currentColor" stroke-width="1.2"/><polyline points="3,2.5 3,0.5 9.5,0.5 9.5,7 7,7" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
      <button class="chat-close" id="closeBtn">
        <svg class="icon-pixel" width="10" height="10" viewBox="0 0 10 10"><line x1="2" y1="2" x2="8" y2="8" stroke="currentColor" stroke-width="1"/><line x1="8" y1="2" x2="2" y2="8" stroke="currentColor" stroke-width="1"/></svg>
        <svg class="icon-clean" width="10" height="10" viewBox="0 0 10 10"><line x1="2" y1="2" x2="8" y2="8" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/><line x1="8" y1="2" x2="2" y2="8" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>
      </button>
    </div>
    <div class="context-progress">
      <div class="context-progress-bar" id="contextBar"></div>
    </div>
    <div class="chat-messages" id="messageList">
    </div>
    <div class="chat-input-area">
      <div class="chat-input-wrapper">
        <button class="chat-attach" id="attachBtn" style="display:none" aria-label="Attach">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5">
            <line x1="7" y1="2" x2="7" y2="12"/>
            <line x1="2" y1="7" x2="12" y2="7"/>
          </svg>
        </button>
        <div class="chat-image-preview" id="imagePreview" style="display:none"></div>
        <textarea id="chatInput" rows="1"></textarea>
      </div>
      <button class="chat-send" id="sendBtn">
        <svg class="icon-pixel send-icon" width="14" height="14" viewBox="0 0 14 14"><rect x="6" y="2" width="2" height="10" fill="currentColor"/><rect x="4" y="4" width="2" height="2" fill="currentColor"/><rect x="8" y="4" width="2" height="2" fill="currentColor"/><rect x="2" y="6" width="2" height="2" fill="currentColor"/><rect x="10" y="6" width="2" height="2" fill="currentColor"/></svg>
        <svg class="icon-clean send-icon" width="14" height="14" viewBox="0 0 14 14"><line x1="7" y1="12" x2="7" y2="3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><polyline points="3,7 7,3 11,7" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
        <svg class="icon-pixel stop-icon" width="14" height="14" viewBox="0 0 14 14" style="display:none"><rect x="3" y="3" width="8" height="8" fill="currentColor"/></svg>
        <svg class="icon-clean stop-icon" width="14" height="14" viewBox="0 0 14 14" style="display:none"><rect x="3" y="3" width="8" height="8" rx="1" fill="currentColor"/></svg>
      </button>
    </div>
  </div>
  <!-- Image viewer overlay -->
  <div class="image-viewer-overlay" id="imageViewer">
    <button class="image-viewer-close" id="imageViewerClose">
      <svg width="20" height="20" viewBox="0 0 20 20"><line x1="4" y1="4" x2="16" y2="16" stroke="white" stroke-width="2" stroke-linecap="round"/><line x1="16" y1="4" x2="4" y2="16" stroke="white" stroke-width="2" stroke-linecap="round"/></svg>
    </button>
    <img class="image-viewer-img" id="imageViewerImg">
    <div class="image-viewer-toolbar">
      <button class="image-viewer-btn" id="imageViewerSave">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M2 10v3h12v-3"/><polyline points="8,2 8,10"/><polyline points="5,7 8,10 11,7"/></svg>
        <span id="imageViewerSaveLabel">Save</span>
      </button>
      <button class="image-viewer-btn" id="imageViewerCopy">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="5" y="5" width="8" height="8" rx="1"/><path d="M3 11V3h8"/></svg>
        <span id="imageViewerCopyLabel">Copy</span>
      </button>
    </div>
  </div>

  <!-- Input context menu -->
  <div class="input-context-menu" id="inputContextMenu">
    <div class="icm-item" data-action="cut" id="icmCut">Cut</div>
    <div class="icm-item" data-action="copy" id="icmCopy">Copy</div>
    <div class="icm-item" data-action="paste" id="icmPaste">Paste</div>
    <div class="icm-separator"></div>
    <div class="icm-item" data-action="selectAll" id="icmSelectAll">Select All</div>
  </div>
  <script src="vendor/purify.min.js"></script>
  <script src="chat.js"></script>
</body>
</html>
